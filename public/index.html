<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Node.js App</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 80px auto; text-align: center; background: #f6f8fa; color: #24292f; }
    h1 { font-size: 2.5rem; margin-bottom: 8px; }
    p { color: #57606a; font-size: 1.1rem; }
    .badge { display: inline-block; background: #2da44e; color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; margin-top: 20px; }
    .api { margin-top: 40px; background: white; border: 1px solid #d0d7de; border-radius: 10px; padding: 20px; text-align: left; }
    .api h3 { margin-bottom: 12px; }
    .route { font-family: monospace; background: #f6f8fa; padding: 6px 12px; border-radius: 6px; margin: 6px 0; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>🚀 My Node.js App</h1>
  <p>Deployed automatically via GitHub Actions + Ansible + AWS EC2</p>
  <div class="badge">● Live</div>

  <div class="api">
    <h3>Available API Routes</h3>
    <div class="route">GET /api/health</div>
    <div class="route">GET /api/hello?name=YourName</div>
  </div>

  <script>
    // Check health on load
    fetch('/api/health')
      .then(r => r.json())
      .then(data => {
        document.querySelector('.badge').textContent = '● Live — ' + data.timestamp;
      });
  </script>
</body>
</html>
